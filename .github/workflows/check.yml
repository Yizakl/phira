name: Build Phira iOS Unsigned IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-ios
          override: true

      - name: Add iOS Rust target
        run: rustup target add aarch64-apple-ios

      - name: Install cargo-lipo
        run: cargo install cargo-lipo

      - name: Build Rust static library for iOS
        run: |
          cargo lipo --release --targets aarch64-apple-ios

      - name: Copy Rust library into iOS Xcode project
        run: |
          mkdir -p phira.xcodeproj/RustLib
          cp target/aarch64-apple-ios/release/lib*.a phira.xcodeproj/RustLib/

      - name: Build and archive Xcode project
        run: |
          xcodebuild \
            -project phira.xcodeproj \
            -scheme phira \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $PWD/build/phira.xcarchive \
            archive

      - name: Export unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/phira.xcarchive \
            -exportPath $PWD/build/ipa \
            -exportOptionsPlist <(
              cat <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>compileBitcode</key><false/>
  <key>method</key><string>development</string>
  <key>signingStyle</key><string>manual</string>
</dict>
</plist>
EOF
            )

      - name: List output
        run: ls -Rlh build/ipa
